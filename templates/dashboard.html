<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AI News Analyzer</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
</head>

<body>

<div class="container py-5">

    <div class="row g-4">

        <!-- Left Side -->
        <div class="col-lg-8">

            <div class="card shadow-lg p-4">

                <h2 class="mb-2">
                    📰 AI News Analyzer
                </h2>

                <p class="text-muted">
                    Paste a news article below and let AI verify whether it is Real or Fake.
                </p>

                {% if error %}
                <div class="alert alert-danger">
                    {{ error }}
                </div>
                {% endif %}

                <form id="newsForm" action="/predict" method="POST">

                    <textarea
                        id="news"
                        name="news"
                        class="form-control"
                        rows="12"
                        placeholder="Paste your news article here..."
                        required></textarea>

                    <div class="d-flex justify-content-between mt-2">

                        <small id="count">0 Characters</small>

                        <small id="words">0 Words</small>

                    </div>

                    <div class="d-flex gap-2 mt-4">

                        <button
                            type="button"
                            class="btn btn-outline-secondary"
                            onclick="sampleNews()">
                            Sample
                        </button>

                        <button
                            type="button"
                            class="btn btn-outline-danger"
                            onclick="clearText()">
                            Clear
                        </button>

                        <button
                            type="submit"
                            class="btn btn-primary ms-auto">
                            Analyze News
                        </button>

                    </div>

                </form>

                <div id="loading" class="text-center mt-4" style="display:none;">

                    <div class="spinner-border text-primary"></div>

                    <p class="mt-3">
                        AI is analyzing the article...
                    </p>

                </div>

            </div>

        </div>

        <!-- Right Side -->

        <div class="col-lg-4">

            <div class="card shadow-lg p-4 stats-card">

                <h4 class="mb-3">
                    📊 Statistics
                </h4>

                <hr>

                <div class="mb-3">
                    <strong>Accuracy</strong>
                    <p>98%</p>
                </div>

                <div class="mb-3">
                    <strong>Model</strong>
                    <p>Logistic Regression</p>
                </div>

                <div class="mb-3">
                    <strong>Technique</strong>
                    <p>TF-IDF</p>
                </div>

                <div>
                    <strong>Dataset</strong>
                    <p>44,898 Articles</p>
                </div>

            </div>

        </div>

    </div>

</div>

<script src="{{ url_for('static', filename='js/app.js') }}"></script>

</body>
</html>
